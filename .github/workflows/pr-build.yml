name: Build the site with Zensical

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7

      - name: Install the project
        run: uv sync --locked

      - name: Run update repo tests
        run: python -m unittest discover -s tests

      - name: Verify generated files are current
        run: python update_repo.py --check

      - name: Build the site with Zensical
        run: uv run zensical build
